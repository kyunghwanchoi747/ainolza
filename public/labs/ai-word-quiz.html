<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/labs/auth-gate.js"></script>
    <title>AI 단어 퀴즈 | AI놀자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background: #050505; color: white; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        @keyframes popIn { 0%{transform:scale(0.9);opacity:0} 100%{transform:scale(1);opacity:1} }
        .option-btn { transition: all 0.2s; position: relative; }
        .option-btn:hover { transform: scale(1.02); }
        .option-btn.correct { background: rgba(34,197,94,0.2) !important; border-color: rgba(34,197,94,0.7) !important; color: #22c55e !important; }
        .option-btn.wrong { background: rgba(239,68,68,0.2) !important; border-color: rgba(239,68,68,0.7) !important; color: #ef4444 !important; }
        .option-btn.disabled { pointer-events: none; opacity: 0.6; }
        /* 정/오답 표시 — 텍스트 좌측에 큼지막한 O / X 마크 */
        .option-btn.correct::before {
            content: '✓'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            font-size: 22px; font-weight: 900; color: #22c55e;
        }
        .option-btn.wrong::before {
            content: '✗'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            font-size: 22px; font-weight: 900; color: #ef4444;
        }
        .option-btn.correct, .option-btn.wrong { padding-left: 44px !important; }
        /* "다시 생각해보세요" 안내 박스 */
        .retry-hint {
            background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.4);
            color: #fbbf24; padding: 10px 14px; border-radius: 12px;
            font-size: 14px; font-weight: 600; text-align: center; margin-top: 12px;
            animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
        }
        .timer-bar { transition: width 0.1s linear; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-3 sm:p-6 pb-10">

    <header class="w-full max-w-2xl mb-6">
        <a href="/" class="text-gray-500 text-sm hover:text-white transition-colors mb-2 inline-block">&larr; AI놀자 홈으로</a>
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-amber-400 to-orange-500">
                    <i class="fa-solid fa-brain mr-2"></i>AI 단어 퀴즈
                </h1>
                <p class="text-gray-400 text-xs sm:text-sm mt-1">AI 용어를 배우면서 두뇌도 훈련하세요!</p>
            </div>
            <div class="text-right">
                <!-- 하트·점수 — 모바일에서 한눈에 보이도록 크게 (시니어 친화) -->
                <div class="flex items-center justify-end gap-4">
                    <div class="flex items-center gap-1.5">
                        <i class="fa-solid fa-heart text-red-400 text-2xl sm:text-2xl"></i>
                        <span id="lives" class="text-2xl sm:text-3xl font-extrabold text-white tabular-nums">3</span>
                    </div>
                    <div id="score-display" class="text-2xl sm:text-3xl font-extrabold text-amber-400 tabular-nums">0점</div>
                </div>
                <div class="text-sm text-gray-400 mt-1.5 font-medium" id="progress">1 / 20</div>
            </div>
        </div>
        <!-- 타이머 바 -->
        <div class="w-full h-1.5 bg-gray-800 rounded-full mt-3 overflow-hidden">
            <div id="timer-bar" class="timer-bar h-full bg-gradient-to-r from-amber-400 to-orange-500 rounded-full" style="width:100%"></div>
        </div>
    </header>

    <main class="w-full max-w-2xl flex-1" id="game-area">

        <!-- 퀴즈 화면 -->
        <div id="quiz-screen">
            <!-- 설명 카드 -->
            <div class="p-6 sm:p-8 rounded-2xl bg-gradient-to-br from-amber-500/10 to-orange-500/10 border border-amber-500/20 mb-6 text-center">
                <div class="text-xs text-amber-400 font-bold uppercase tracking-widest mb-2" id="q-category">기초</div>
                <p class="text-lg sm:text-xl font-medium leading-relaxed break-keep" id="q-description">설명이 여기에 표시됩니다.</p>
            </div>

            <!-- 보기 4개 — 모바일은 1열(긴 보기도 안 짤림), 태블릿 이상 2열 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="options-grid"></div>

            <!-- 정답 해설 -->
            <div id="explanation" class="hidden mt-4 p-4 rounded-xl bg-gray-900 border border-gray-700 text-sm text-gray-300 leading-relaxed break-keep">
                <div class="text-xs font-bold text-amber-400 mb-2"><i class="fa-solid fa-lightbulb mr-1"></i> 알아두세요!</div>
                <p id="explanation-text"></p>
            </div>

            <!-- 다음 버튼 -->
            <button id="next-btn" class="hidden w-full mt-4 py-3 rounded-xl bg-gray-800 hover:bg-gray-700 border border-gray-600 font-bold text-sm transition-all">
                다음 문제 <i class="fa-solid fa-arrow-right ml-1"></i>
            </button>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="hidden pop-in text-center py-10">
            <div class="text-6xl mb-4" id="result-emoji"></div>
            <h2 class="text-3xl font-bold mb-2" id="result-title"></h2>
            <p class="text-gray-400 mb-1" id="result-score"></p>
            <p class="text-gray-500 text-sm mb-6" id="result-msg"></p>

            <!-- 점수 요약 -->
            <div class="grid grid-cols-3 gap-4 max-w-sm mx-auto mb-8">
                <div class="p-4 rounded-xl bg-gray-900 border border-gray-700">
                    <div class="text-2xl font-bold text-green-400" id="stat-correct">0</div>
                    <div class="text-xs text-gray-500">정답</div>
                </div>
                <div class="p-4 rounded-xl bg-gray-900 border border-gray-700">
                    <div class="text-2xl font-bold text-red-400" id="stat-wrong">0</div>
                    <div class="text-xs text-gray-500">오답</div>
                </div>
                <div class="p-4 rounded-xl bg-gray-900 border border-gray-700">
                    <div class="text-2xl font-bold text-amber-400" id="stat-streak">0</div>
                    <div class="text-xs text-gray-500">최고 연속</div>
                </div>
            </div>

            <div id="share-area" class="max-w-sm mx-auto"></div>

            <div class="flex flex-col gap-3 max-w-xs mx-auto mt-4">
                <button onclick="restartGame()" class="py-3 rounded-xl bg-gradient-to-r from-amber-500 to-orange-500 font-bold text-sm text-black">다시 도전하기</button>
                <a href="/" class="py-3 rounded-xl bg-gray-800 border border-gray-600 font-bold text-sm text-center text-gray-300">홈으로 돌아가기</a>
            </div>

            <div id="cta-area" class="max-w-sm mx-auto"></div>
        </div>
    </main>
    <script src="/labs/shared.js"></script>
    <script src="/labs/word-pool.js"></script>

    <!-- 마스코트 -->
    <div class="w-full max-w-2xl mt-6 flex items-center gap-4">
        <div class="w-14 h-14 shrink-0 rounded-full border-2 border-amber-400 p-0.5 bg-gray-800">
            <img src="/mascot.png" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=ainolza'" alt="마스코트" class="w-full h-full object-cover rounded-full">
        </div>
        <div class="bg-gray-800 text-gray-200 p-3 rounded-2xl border border-gray-700 flex-1 text-sm">
            <span id="mascot-msg">AI 용어를 맞춰보세요! 15초 안에 답을 골라야 해요. 하트 3개가 다 떨어지면 끝!</span>
        </div>
    </div>

    <script>
        // 문제 풀은 /labs/word-pool.js 에서 로드 (120문제, 6 카테고리).
        // 자료 출처는 word-pool.js 상단 주석 참조.
        const allQuestions = (typeof window !== 'undefined' && window.wordPool) ? window.wordPool : [];

        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let lives = 3;
        let streak = 0;
        let maxStreak = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let timerInterval = null;
        let timeLeft = 15;
        // 현재 문제에서 1차 시도가 오답이었는지 — 2차 시도용 상태
        let firstAttemptWrong = false;

        const elLives = document.getElementById('lives');
        const elScoreDisplay = document.getElementById('score-display');
        const elProgress = document.getElementById('progress');
        const elTimerBar = document.getElementById('timer-bar');
        const elQCategory = document.getElementById('q-category');
        const elQDescription = document.getElementById('q-description');
        const elOptionsGrid = document.getElementById('options-grid');
        const elExplanation = document.getElementById('explanation');
        const elExplanationText = document.getElementById('explanation-text');
        const elNextBtn = document.getElementById('next-btn');
        const elQuizScreen = document.getElementById('quiz-screen');
        const elResultScreen = document.getElementById('result-screen');
        const elMascotMsg = document.getElementById('mascot-msg');

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startGame() {
            questions = shuffle(allQuestions).slice(0, 20);
            currentIndex = 0;
            score = 0;
            lives = 3;
            streak = 0;
            maxStreak = 0;
            correctCount = 0;
            wrongCount = 0;
            elLives.textContent = lives;
            elScoreDisplay.textContent = '0점';
            elQuizScreen.classList.remove('hidden');
            elResultScreen.classList.add('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            if (currentIndex >= questions.length || lives <= 0) {
                showResult();
                return;
            }

            const q = questions[currentIndex];
            elProgress.textContent = `${currentIndex + 1} / ${questions.length}`;
            elQCategory.textContent = q.category;
            elQDescription.textContent = q.description;
            elExplanation.classList.add('hidden');
            elNextBtn.classList.add('hidden');
            // 새 문제 시작 — 1차 오답 상태 리셋 + 이전 안내 박스 제거
            firstAttemptWrong = false;
            const oldHint = document.getElementById('retry-hint');
            if (oldHint) oldHint.remove();

            // 보기 셔플
            const shuffledOptions = shuffle(q.options);
            elOptionsGrid.innerHTML = '';
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn px-4 py-5 sm:py-4 rounded-xl bg-gray-900 border border-gray-700 text-base sm:text-base font-medium hover:border-amber-400 hover:bg-amber-400/5 text-center break-keep';
                btn.textContent = opt;
                btn.onclick = () => selectAnswer(btn, opt, q);
                elOptionsGrid.appendChild(btn);
            });

            // 타이머 시작
            startTimer();

            // 마스코트 메시지
            const msgs = ["이 단어 아시나요?", "15초 안에 골라보세요!", "힌트: 설명을 잘 읽어보세요!", "자신감을 가져보세요!", "천천히 생각해도 괜찮아요!"];
            elMascotMsg.textContent = msgs[Math.floor(Math.random() * msgs.length)];
        }

        function startTimer() {
            timeLeft = 15;
            elTimerBar.style.width = '100%';
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const pct = (timeLeft / 15) * 100;
                elTimerBar.style.width = Math.max(0, pct) + '%';
                if (pct < 30) {
                    elTimerBar.className = 'timer-bar h-full bg-red-500 rounded-full';
                } else if (pct < 60) {
                    elTimerBar.className = 'timer-bar h-full bg-yellow-500 rounded-full';
                } else {
                    elTimerBar.className = 'timer-bar h-full bg-gradient-to-r from-amber-400 to-orange-500 rounded-full';
                }
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timeUp();
                }
            }, 100);
        }

        function timeUp() {
            lives--;
            wrongCount++;
            streak = 0;
            elLives.textContent = lives;

            // 모든 버튼 비활성화 + 정답 표시
            const q = questions[currentIndex];
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.add('disabled');
                if (btn.textContent === q.answer) btn.classList.add('correct');
            });

            // 1차 오답 후 시간 초과 시 안내 박스도 정리
            const hint = document.getElementById('retry-hint');
            if (hint) hint.remove();

            elMascotMsg.textContent = "시간 초과! 정답은 '" + q.answer + "'이에요.";
            elExplanationText.textContent = q.explanation;
            elExplanation.classList.remove('hidden');
            elNextBtn.classList.remove('hidden');
        }

        function selectAnswer(btn, selected, q) {
            const isCorrect = selected === q.answer;

            // ─────── 정답 처리 ───────
            if (isCorrect) {
                clearInterval(timerInterval);
                // 정답 보기 + 클릭 보기 모두 ✓ 표시 (같은 버튼). 나머지는 비활성화만.
                document.querySelectorAll('.option-btn').forEach(b => {
                    b.classList.add('disabled');
                });
                btn.classList.add('correct');

                // 점수: 1차 정답이면 정상 점수, 2차 정답이면 절반
                const baseScore = firstAttemptWrong ? 5 : 10;
                const bonus = firstAttemptWrong ? 0 : Math.ceil(timeLeft) * 5;
                score += baseScore + bonus;
                correctCount++;
                if (firstAttemptWrong) {
                    // 재도전 정답은 연속 정답 streak 끊지도 잇지도 않음(현 streak 유지)
                    elMascotMsg.textContent = "다시 풀어서 맞췄어요! 잘했어요.";
                } else {
                    streak++;
                    if (streak > maxStreak) maxStreak = streak;
                    elMascotMsg.textContent = streak >= 3 ? `${streak}연속 정답! 대단해요!` : "정답! 잘하고 있어요!";
                    if (streak >= 5) confetti({ particleCount: 30, spread: 60, origin: { y: 0.7 } });
                }

                elScoreDisplay.textContent = score + '점';
                elExplanationText.textContent = q.explanation;
                elExplanation.classList.remove('hidden');
                elNextBtn.classList.remove('hidden');
                return;
            }

            // ─────── 오답 처리 ───────
            // 1차 오답: 하트 안 깎임, 정답 미공개, 다른 보기 다시 선택 가능
            if (!firstAttemptWrong) {
                firstAttemptWrong = true;
                btn.classList.add('wrong', 'disabled');
                btn.parentElement.classList.add('shake');
                setTimeout(() => btn.parentElement.classList.remove('shake'), 500);

                // "다시 생각해보세요" 안내 박스 (보기 그리드 바로 아래)
                let hint = document.getElementById('retry-hint');
                if (!hint) {
                    hint = document.createElement('div');
                    hint.id = 'retry-hint';
                    hint.className = 'retry-hint';
                    hint.textContent = '다시 생각해보세요!';
                    elOptionsGrid.parentNode.insertBefore(hint, elOptionsGrid.nextSibling);
                }
                elMascotMsg.textContent = "한 번 더 골라보세요. 설명을 다시 읽어보세요!";
                return;
            }

            // 2차 오답: 하트 -1, 정답 공개, 해설 노출
            clearInterval(timerInterval);
            btn.classList.add('wrong', 'disabled');
            btn.parentElement.classList.add('shake');
            // 정답 보기에 ✓ 표시 + 전체 비활성화
            document.querySelectorAll('.option-btn').forEach(b => {
                b.classList.add('disabled');
                if (b.textContent === q.answer) b.classList.add('correct');
            });
            lives--;
            wrongCount++;
            streak = 0;
            elLives.textContent = lives;
            elMascotMsg.textContent = "아쉬워요! 정답은 '" + q.answer + "'이에요.";

            // 안내 박스 제거 (정답이 공개됐으니 더 이상 의미 없음)
            const hint = document.getElementById('retry-hint');
            if (hint) hint.remove();

            elScoreDisplay.textContent = score + '점';
            elExplanationText.textContent = q.explanation;
            elExplanation.classList.remove('hidden');
            elNextBtn.classList.remove('hidden');
        }

        elNextBtn.addEventListener('click', () => {
            currentIndex++;
            renderQuestion();
        });

        function showResult() {
            clearInterval(timerInterval);
            elQuizScreen.classList.add('hidden');
            elResultScreen.classList.remove('hidden');

            document.getElementById('stat-correct').textContent = correctCount;
            document.getElementById('stat-wrong').textContent = wrongCount;
            document.getElementById('stat-streak').textContent = maxStreak;

            const pct = Math.round((correctCount / (correctCount + wrongCount)) * 100) || 0;
            document.getElementById('result-score').textContent = `총점: ${score}점 (정답률 ${pct}%)`;

            if (pct >= 90) {
                document.getElementById('result-emoji').textContent = '🏆';
                document.getElementById('result-title').textContent = 'AI 마스터!';
                document.getElementById('result-msg').textContent = '놀라운 실력이에요. AI 전문가 수준!';
                confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
            } else if (pct >= 70) {
                document.getElementById('result-emoji').textContent = '🎉';
                document.getElementById('result-title').textContent = 'AI 고수!';
                document.getElementById('result-msg').textContent = 'AI 용어를 꽤 잘 알고 있어요!';
            } else if (pct >= 50) {
                document.getElementById('result-emoji').textContent = '💪';
                document.getElementById('result-title').textContent = 'AI 중수!';
                document.getElementById('result-msg').textContent = '조금만 더 공부하면 고수가 될 수 있어요!';
            } else {
                document.getElementById('result-emoji').textContent = '📚';
                document.getElementById('result-title').textContent = 'AI 입문자!';
                document.getElementById('result-msg').textContent = '걱정 마세요. 다시 도전하면서 배워가요!';
            }

            // 공유 + CTA
            const title = document.getElementById('result-title').textContent;
            const shareArea = document.getElementById('share-area');
            const ctaArea = document.getElementById('cta-area');
            shareArea.innerHTML = '';
            ctaArea.innerHTML = '';
            createShareButtons(shareArea, { gameName: 'AI 단어 퀴즈', score: score + '점', subtitle: `정답률 ${pct}%`, badgeText: title });
            createCTABanner(ctaArea);
        }

        function restartGame() { startGame(); }
        startGame();
    </script>
</body>
</html>
