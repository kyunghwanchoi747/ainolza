<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 AI 퀴즈 | AI놀자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background: #050505; color: white; }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        @keyframes popIn { 0%{transform:scale(0.9);opacity:0} 100%{transform:scale(1);opacity:1} }
        .option-btn { transition: all 0.2s; }
        .option-btn:hover { transform: scale(1.02); }
        .option-btn.correct { background: rgba(34,197,94,0.2) !important; border-color: rgba(34,197,94,0.7) !important; }
        .option-btn.wrong { background: rgba(239,68,68,0.2) !important; border-color: rgba(239,68,68,0.7) !important; }
        .option-btn.disabled { pointer-events: none; opacity: 0.6; }
        .calendar-day { width: 36px; height: 36px; }
        .calendar-day.checked { background: rgba(34,197,94,0.3); border-color: rgba(34,197,94,0.6); }
        .calendar-day.today { border-color: rgba(250,204,21,0.8); box-shadow: 0 0 8px rgba(250,204,21,0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-3 sm:p-6 pb-10">

    <header class="w-full max-w-2xl mb-6">
        <a href="/" class="text-gray-500 text-sm hover:text-white transition-colors mb-2 inline-block">&larr; AI놀자 홈으로</a>
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-orange-400">
                    <i class="fa-solid fa-calendar-check mr-2"></i>오늘의 AI 퀴즈
                </h1>
                <p class="text-gray-400 text-xs sm:text-sm mt-1">매일 1문제! AI 상식을 쌓고 출석 도장을 모아보세요.</p>
            </div>
            <div class="text-right">
                <div class="text-sm font-bold text-yellow-400"><i class="fa-solid fa-fire mr-1"></i><span id="streak-count">0</span>일 연속</div>
                <div class="text-xs text-gray-500" id="today-date"></div>
            </div>
        </div>
    </header>

    <main class="w-full max-w-2xl">

        <!-- 출석 달력 -->
        <div class="mb-6 p-4 rounded-2xl bg-gray-900 border border-gray-700">
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-bold text-gray-300"><i class="fa-solid fa-calendar mr-1"></i> 이번 달 출석</span>
                <span class="text-xs text-gray-500" id="month-label"></span>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center" id="calendar-grid">
                <div class="text-[10px] text-gray-600 py-1">일</div>
                <div class="text-[10px] text-gray-600 py-1">월</div>
                <div class="text-[10px] text-gray-600 py-1">화</div>
                <div class="text-[10px] text-gray-600 py-1">수</div>
                <div class="text-[10px] text-gray-600 py-1">목</div>
                <div class="text-[10px] text-gray-600 py-1">금</div>
                <div class="text-[10px] text-gray-600 py-1">토</div>
            </div>
            <div class="flex justify-between mt-3 text-xs text-gray-500">
                <span>출석 <span class="text-green-400 font-bold" id="attendance-count">0</span>일</span>
                <span>최고 연속 <span class="text-yellow-400 font-bold" id="max-streak">0</span>일</span>
            </div>
        </div>

        <!-- 퀴즈 영역 -->
        <div id="quiz-section">
            <!-- 이미 오늘 풀었을 때 -->
            <div id="already-done" class="hidden text-center py-12">
                <div class="text-6xl mb-4">&#9989;</div>
                <h2 class="text-2xl font-bold mb-2">오늘의 퀴즈 완료!</h2>
                <p class="text-gray-400 mb-2">내일 새로운 문제가 기다리고 있어요.</p>
                <p class="text-gray-500 text-sm mb-6" id="done-result"></p>
                <div id="done-share-area" class="max-w-sm mx-auto mb-4"></div>
                <a href="/" class="text-sm text-gray-500 hover:text-white underline">홈으로 돌아가기</a>
            </div>

            <!-- 퀴즈 문제 -->
            <div id="quiz-active">
                <div class="p-6 sm:p-8 rounded-2xl bg-gradient-to-br from-yellow-500/10 to-orange-500/10 border border-yellow-500/20 mb-6 text-center">
                    <div class="text-xs text-yellow-400 font-bold uppercase tracking-widest mb-3" id="q-number">오늘의 문제</div>
                    <h2 class="text-lg sm:text-xl font-bold leading-relaxed break-keep" id="q-text"></h2>
                </div>

                <div class="space-y-3" id="options-list"></div>

                <div id="explanation-area" class="hidden mt-4 p-4 rounded-xl bg-gray-900 border border-gray-700">
                    <div class="text-xs font-bold text-yellow-400 mb-2"><i class="fa-solid fa-lightbulb mr-1"></i> 오늘의 AI 지식</div>
                    <p id="explanation-text" class="text-sm text-gray-300 leading-relaxed break-keep"></p>
                </div>

                <div id="result-area" class="hidden mt-4 text-center">
                    <div id="result-banner" class="p-4 rounded-xl mb-4 font-bold text-lg"></div>
                    <div id="quiz-share-area" class="max-w-sm mx-auto mb-4"></div>
                    <div id="quiz-cta-area" class="max-w-sm mx-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 마스코트 -->
    <div class="w-full max-w-2xl mt-6 flex items-center gap-4">
        <div class="w-14 h-14 shrink-0 rounded-full border-2 border-yellow-400 p-0.5 bg-gray-800">
            <img src="/mascot.png" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=ainolza'" alt="마스코트" class="w-full h-full object-cover rounded-full">
        </div>
        <div class="bg-gray-800 text-gray-200 p-3 rounded-2xl border border-gray-700 flex-1 text-sm">
            <span id="mascot-msg">매일 1문제씩 풀면서 AI 상식을 쌓아보세요! 연속 출석하면 특별해요.</span>
        </div>
    </div>

    <script src="/labs/shared.js"></script>
    <script src="/labs/quiz-pool.js"></script>
    <script>
        // quizPool은 quiz-pool.js에서 로드 (120문제)

        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
        const todayQuiz = quizPool[dayOfYear % quizPool.length];

        // 로컬스토리지 키
        const STORAGE_KEY = 'ainolza_daily';

        function getData() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
        }
        function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

        // 출석 달력 렌더링
        function renderCalendar() {
            const data = getData();
            const year = today.getFullYear();
            const month = today.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            document.getElementById('month-label').textContent = `${year}년 ${month + 1}월`;
            document.getElementById('today-date').textContent = `${month + 1}/${today.getDate()}`;

            const grid = document.getElementById('calendar-grid');
            // 요일 헤더 유지, 날짜만 다시 그림
            const headers = grid.querySelectorAll('div');
            while (grid.children.length > 7) grid.removeChild(grid.lastChild);

            // 빈칸
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
            }

            // 날짜
            const checkedDays = data.checked || [];
            let attendanceCount = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isChecked = checkedDays.includes(dateStr);
                const isToday = d === today.getDate();
                if (isChecked) attendanceCount++;

                const cell = document.createElement('div');
                cell.className = `calendar-day rounded-lg border border-gray-800 flex items-center justify-center text-xs font-medium ${isChecked ? 'checked text-green-400' : 'text-gray-600'} ${isToday ? 'today' : ''}`;
                cell.textContent = isChecked ? '✓' : d;
                grid.appendChild(cell);
            }

            document.getElementById('attendance-count').textContent = attendanceCount;

            // 연속 출석 계산
            let streak = 0;
            const sortedChecked = [...checkedDays].sort().reverse();
            let checkDate = new Date(today);
            for (const d of sortedChecked) {
                const expected = checkDate.toISOString().split('T')[0];
                if (d === expected) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else break;
            }
            // 오늘 아직 안 풀었으면 어제부터 체크
            if (!checkedDays.includes(todayStr)) {
                streak = 0;
                checkDate = new Date(today);
                checkDate.setDate(checkDate.getDate() - 1);
                for (const d of sortedChecked) {
                    const expected = checkDate.toISOString().split('T')[0];
                    if (d === expected) { streak++; checkDate.setDate(checkDate.getDate() - 1); } else break;
                }
            }
            document.getElementById('streak-count').textContent = streak;
            document.getElementById('max-streak').textContent = data.maxStreak || 0;
        }

        // 퀴즈 렌더링
        function renderQuiz() {
            const data = getData();
            if (data.lastQuizDate === todayStr) {
                // 이미 풀었음
                document.getElementById('quiz-active').classList.add('hidden');
                document.getElementById('already-done').classList.remove('hidden');
                document.getElementById('done-result').textContent = data.lastResult === 'correct' ? '오늘 정답을 맞추셨어요!' : '아쉽지만 내일 다시 도전!';
                const doneShareArea = document.getElementById('done-share-area');
                doneShareArea.innerHTML = '';
                if (typeof createShareButtons === 'function') {
                    createShareButtons(doneShareArea, { gameName: '오늘의 AI 퀴즈', score: data.lastResult === 'correct' ? '정답!' : '오답', subtitle: todayStr, badgeText: `${document.getElementById('streak-count').textContent}일 연속 출석` });
                }
                return;
            }

            document.getElementById('q-text').textContent = todayQuiz.q;

            const list = document.getElementById('options-list');
            list.innerHTML = '';
            // 보기 셔플
            const shuffled = [...todayQuiz.options].sort(() => Math.random() - 0.5);
            shuffled.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full p-4 rounded-xl bg-gray-900 border border-gray-700 text-sm sm:text-base font-medium hover:border-yellow-400 hover:bg-yellow-400/5 text-left transition-all';
                btn.textContent = opt;
                btn.onclick = () => selectAnswer(btn, opt);
                list.appendChild(btn);
            });
        }

        function selectAnswer(btn, selected) {
            const isCorrect = selected === todayQuiz.answer;
            const data = getData();

            // 모든 버튼 비활성화
            document.querySelectorAll('.option-btn').forEach(b => {
                b.classList.add('disabled');
                if (b.textContent === todayQuiz.answer) b.classList.add('correct');
            });
            if (!isCorrect) btn.classList.add('wrong');

            // 출석 체크
            const checked = data.checked || [];
            if (!checked.includes(todayStr)) checked.push(todayStr);

            // 연속 출석 업데이트
            let streak = 0;
            const sorted = [...checked].sort().reverse();
            let checkDate = new Date(today);
            for (const d of sorted) {
                if (d === checkDate.toISOString().split('T')[0]) { streak++; checkDate.setDate(checkDate.getDate() - 1); } else break;
            }
            const maxStreak = Math.max(streak, data.maxStreak || 0);

            saveData({ ...data, checked, lastQuizDate: todayStr, lastResult: isCorrect ? 'correct' : 'wrong', maxStreak });

            // UI 업데이트
            document.getElementById('explanation-text').textContent = todayQuiz.explanation;
            document.getElementById('explanation-area').classList.remove('hidden');

            const banner = document.getElementById('result-banner');
            if (isCorrect) {
                banner.className = 'p-4 rounded-xl mb-4 font-bold text-lg bg-green-500/20 border border-green-500/30 text-green-400';
                banner.textContent = '정답! 오늘의 출석 도장이 찍혔어요!';
                document.getElementById('mascot-msg').textContent = streak >= 3 ? `${streak}일 연속 출석! 대단해요!` : '정답! 내일도 도전해보세요!';
                confetti({ particleCount: 80, spread: 70, origin: { y: 0.7 } });
            } else {
                banner.className = 'p-4 rounded-xl mb-4 font-bold text-lg bg-orange-500/20 border border-orange-500/30 text-orange-400';
                banner.textContent = `아쉬워요! 정답은 "${todayQuiz.answer}"이에요. 출석 도장은 찍혔어요!`;
                document.getElementById('mascot-msg').textContent = '틀려도 괜찮아요! 새로운 지식을 하나 배웠잖아요.';
            }
            document.getElementById('result-area').classList.remove('hidden');

            // 공유 + CTA
            const shareArea = document.getElementById('quiz-share-area');
            const ctaArea = document.getElementById('quiz-cta-area');
            shareArea.innerHTML = '';
            ctaArea.innerHTML = '';
            if (typeof createShareButtons === 'function') {
                createShareButtons(shareArea, { gameName: '오늘의 AI 퀴즈', score: isCorrect ? '정답!' : '도전!', subtitle: todayStr, badgeText: `${streak}일 연속 출석` });
                createCTABanner(ctaArea);
            }

            renderCalendar();
        }

        renderCalendar();
        renderQuiz();
    </script>
</body>
</html>
