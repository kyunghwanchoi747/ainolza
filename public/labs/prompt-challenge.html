<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI놀자 프롬프트 챌린지</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.5);
        }

        .neon-border-magenta {
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3), inset 0 0 10px rgba(255, 0, 255, 0.1);
            border: 1px solid rgba(255, 0, 255, 0.5);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .speech-bubble {
            position: relative;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #1f2937 transparent transparent transparent;
            display: block;
            width: 0;
        }

        @media (min-width: 768px) {
            .speech-bubble::after {
                bottom: 20%;
                left: -15px;
                transform: translateY(-50%);
                border-width: 15px 15px 15px 0;
                border-color: transparent #1f2937 transparent transparent;
            }
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00ffff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pop-in {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .rubric-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            width: 0%;
        }

        .tab-content { display: none; }
        .tab-content.active { display: flex; }

        .tab-btn.active {
            background: rgba(139, 92, 246, 0.3);
            border-color: rgba(139, 92, 246, 0.7);
            color: white;
        }

        .prev-prompt-ghost {
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .score-circle-wrap {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .score-circle-wrap svg {
            width: 100%;
            height: 100%;
        }
        .score-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* 프로그레스 바 */
        .progress-track {
            height: 8px;
            background: #1f2937;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #06b6d4, #a855f7);
        }
        .tier-label {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 700;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-3 sm:p-4 pb-10">

    <!-- 헤더 -->
    <header class="w-full max-w-6xl flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 gap-2">
        <div>
            <a href="/" class="text-gray-500 text-sm hover:text-white transition-colors mb-1 inline-block">&larr; AI놀자 홈으로</a>
            <h1 class="text-2xl sm:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">
                <i class="fa-solid fa-gamepad mr-2"></i>AI놀자 프롬프트 챌린지
            </h1>
            <p class="text-gray-400 text-xs sm:text-sm mt-1">이미지를 보고 AI에게 어떤 명령을 내려야 할지 맞춰보세요!</p>
        </div>
        <div class="flex flex-col items-end gap-1 min-w-[160px]">
            <div class="flex items-center gap-2">
                <span id="tier-badge" class="tier-label bg-green-500/20 text-green-400 border border-green-500/40">입문</span>
                <div class="text-lg sm:text-xl font-bold text-glow" id="level-display">LEVEL 1</div>
            </div>
            <div class="w-full flex items-center gap-2">
                <div class="progress-track flex-1">
                    <div class="progress-fill" id="progress-fill" style="width:5%"></div>
                </div>
                <span class="text-xs text-gray-500 font-mono" id="progress-text">1/20</span>
            </div>
        </div>
    </header>

    <!-- 모바일 탭 버튼 -->
    <div class="w-full max-w-6xl flex gap-2 mb-3 md:hidden">
        <button class="tab-btn active flex-1 py-2 rounded-lg bg-gray-900 border border-gray-700 text-gray-300 text-sm font-bold transition-all" data-tab="image">
            <i class="fa-solid fa-image mr-1"></i> 이미지 보기
        </button>
        <button class="tab-btn flex-1 py-2 rounded-lg bg-gray-900 border border-gray-700 text-gray-300 text-sm font-bold transition-all" data-tab="write">
            <i class="fa-solid fa-pen mr-1"></i> 프롬프트 작성
        </button>
    </div>

    <!-- 메인 그리드 -->
    <main class="w-full max-w-6xl gap-6 relative z-10" id="main-grid" style="display:grid; grid-template-columns: 1fr;">

        <!-- 이미지 패널 -->
        <div id="panel-image" class="tab-content active flex-col neon-border rounded-2xl overflow-hidden bg-gray-900 relative group md:flex">
            <div class="absolute top-3 left-3 bg-black/60 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-bold border border-cyan-500/30 text-cyan-300 z-10">
                <i class="fa-solid fa-image mr-1"></i>Target Image
            </div>
            <div class="absolute top-3 right-3 bg-purple-600/80 px-3 py-1 rounded-full text-xs font-bold text-white z-10" id="difficulty-badge">
                입문 ★
            </div>
            <img id="target-image" src="" alt="AI Generated Image" class="w-full h-64 sm:h-80 md:h-full object-cover transition-transform duration-700 group-hover:scale-105" style="min-height:280px; max-height:460px;">

            <!-- 100점 예시 -->
            <div id="answer-reveal" class="hidden p-4 bg-black/80 border-t border-cyan-500/30">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-xs font-bold text-cyan-400"><i class="fa-solid fa-star mr-1"></i>100점 프롬프트 예시</span>
                    <span class="text-xs text-gray-500">(정답의 기준)</span>
                </div>
                <p id="answer-text" class="text-sm text-gray-200 leading-relaxed break-keep"></p>
            </div>
        </div>

        <!-- 입력 패널 -->
        <div id="panel-write" class="tab-content active flex-col justify-between neon-border-magenta rounded-2xl bg-gray-900/80 p-4 sm:p-6 md:flex">
            <div>
                <h2 class="text-lg sm:text-xl font-bold mb-3 flex items-center gap-2">
                    <i class="fa-solid fa-terminal"></i> 프롬프트 입력창
                </h2>

                <!-- 채점 기준 안내 -->
                <div class="mb-3 p-3 rounded-xl bg-black/30 border border-gray-800 text-xs text-gray-400 leading-relaxed">
                    <span class="text-purple-400 font-bold">채점 기준:</span>
                    <span class="ml-1">핵심 대상(25) + 색상·수량(25) + 위치·배경(25) + 세부 묘사(25)</span>
                </div>

                <!-- 이전 프롬프트 표시 영역 -->
                <div id="prev-prompt-area" class="hidden">
                    <div class="text-xs text-gray-600 mb-1 flex items-center gap-1">
                        <i class="fa-solid fa-clock-rotate-left"></i> 이전 시도
                    </div>
                    <div id="prev-prompt-text" class="prev-prompt-ghost"></div>
                </div>

                <div class="relative">
                    <textarea id="prompt-input" rows="5" class="w-full bg-black/50 border border-gray-700 rounded-xl p-3 sm:p-4 text-white text-sm sm:text-base focus:outline-none focus:border-fuchsia-500 focus:ring-2 focus:ring-fuchsia-500/50 resize-none transition-all placeholder-gray-600" placeholder="예: 갈색 나무 식탁 위에 빨간 사과 한 개가 놓여있다..."></textarea>
                    <div class="absolute bottom-3 right-3 text-xs text-gray-500 font-mono">
                        <span id="char-count">0</span> / 300
                    </div>
                </div>

                <div class="flex gap-2 mt-3">
                    <button id="btn-custom-hint" class="flex-1 py-2 rounded-lg bg-gray-800 border border-cyan-500/50 text-cyan-300 text-xs sm:text-sm font-bold hover:bg-gray-700 transition-colors flex justify-center items-center gap-1">
                        &#10024; 맞춤 힌트
                    </button>
                    <button id="btn-enhance" class="flex-1 py-2 rounded-lg bg-gray-800 border border-fuchsia-500/50 text-fuchsia-300 text-xs sm:text-sm font-bold hover:bg-gray-700 transition-colors flex justify-center items-center gap-1">
                        &#10024; 프롬프트 마법사
                    </button>
                    <button id="btn-show-answer" class="hidden py-2 px-3 rounded-lg bg-gray-800 border border-yellow-500/50 text-yellow-300 text-xs sm:text-sm font-bold hover:bg-gray-700 transition-colors flex justify-center items-center gap-1 whitespace-nowrap">
                        <i class="fa-solid fa-eye"></i> 정답
                    </button>
                </div>
            </div>

            <div class="mt-4">
                <button id="submit-btn" class="w-full py-3 sm:py-4 rounded-xl bg-gradient-to-r from-fuchsia-600 to-purple-600 hover:from-fuchsia-500 hover:to-purple-500 font-bold text-base sm:text-lg shadow-[0_0_15px_rgba(192,38,211,0.5)] transition-all hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 채점하기
                </button>
            </div>
        </div>
    </main>

    <!-- 마스코트 힌트 -->
    <div class="w-full max-w-6xl mt-5 flex flex-col md:flex-row items-center md:items-start gap-4">
        <div class="w-16 h-16 sm:w-20 sm:h-20 shrink-0 rounded-full border-2 border-cyan-400 p-1 bg-gray-800 shadow-[0_0_20px_rgba(0,255,255,0.2)]">
            <img src="/mascot.png" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=ainolza&backgroundColor=1f2937'" alt="AI놀자 마스코트" class="w-full h-full object-cover rounded-full">
        </div>
        <div class="speech-bubble bg-gray-800 text-gray-200 p-3 sm:p-5 rounded-2xl border border-gray-700 shadow-lg flex-1 md:mt-3 w-full text-center md:text-left">
            <h3 class="font-bold text-cyan-400 text-xs sm:text-sm mb-1"><i class="fa-regular fa-lightbulb mr-1"></i> AI 디렉터 힌트</h3>
            <p id="mascot-hint" class="text-sm leading-relaxed break-keep">
                반갑습니다! 사진에 보이는 것을 최대한 자세히 설명해보세요. 색깔, 개수, 위치가 중요해요!
            </p>
        </div>
    </div>

    <!-- 결과 모달 -->
    <div id="result-modal" class="fixed inset-0 bg-black/85 backdrop-blur-sm z-50 flex items-center justify-center hidden p-3">
        <div class="bg-gray-900 border border-gray-700 rounded-2xl p-5 sm:p-8 max-w-lg w-full text-center pop-in shadow-[0_0_30px_rgba(0,0,0,1)] relative overflow-hidden max-h-[92vh] overflow-y-auto">
            <div id="modal-bg-glow" class="absolute inset-0 opacity-20 pointer-events-none transition-colors duration-300"></div>

            <div class="relative z-10">
                <div class="flex items-center justify-center gap-5 mb-4">
                    <div id="result-icon" class="text-5xl"></div>
                    <div class="score-circle-wrap">
                        <svg viewBox="0 0 36 36">
                            <path class="text-gray-700" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path id="score-circle" stroke-dasharray="0, 100" stroke-width="3" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div class="score-center">
                            <span id="score-text" class="text-2xl font-bold">0</span>
                            <span class="text-xs text-gray-400">점</span>
                        </div>
                    </div>
                    <div>
                        <h2 id="result-title" class="text-xl font-bold leading-tight">결과</h2>
                        <div id="pass-label" class="text-xs mt-1 text-gray-500">합격 기준: 60점</div>
                    </div>
                </div>

                <!-- 루브릭 채점표 -->
                <div id="rubric-section" class="mb-4 bg-black/40 rounded-xl p-4 border border-gray-800 text-left">
                    <div class="text-xs font-bold text-gray-400 mb-3 flex items-center gap-1">
                        <i class="fa-solid fa-chart-bar"></i> 카테고리별 점수
                    </div>
                    <div class="space-y-2" id="rubric-bars"></div>
                </div>

                <!-- AI 피드백 -->
                <div id="feedback-text" class="text-gray-300 text-sm mb-5 bg-black/40 p-3 rounded-xl text-left border border-gray-800 break-keep leading-relaxed"></div>

                <!-- 액션 버튼들 -->
                <div class="flex flex-col gap-2">
                    <button id="next-action-btn" class="w-full py-3 rounded-xl font-bold text-white transition-all transform hover:scale-105 active:scale-95"></button>
                    <button id="show-answer-modal-btn" class="hidden w-full py-2 rounded-xl font-bold text-yellow-300 bg-gray-800 border border-yellow-500/40 hover:bg-gray-700 text-sm transition-all">
                        <i class="fa-solid fa-lightbulb mr-1"></i> 100점 프롬프트 보기
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const levels = [
            // ===== 입문 (1~5): 단순한 사물 하나, 색깔과 개수 ★ =====
            {
                level: 1,
                tier: "입문",
                tierColor: "bg-green-500/20 text-green-400 border-green-500/40",
                difficulty: "입문 ★",

                hint: "사진 속에 과일이 보이네요! 무슨 색이고, 몇 개이고, 어디에 있는지 말해보세요."

            {

                image: "/labs/images/lv03-cat.jpg",

                hint: "귀여운 동물이 보이네요! 어떤 색인지, 어떤 표정인지 말해볼까요?"

            {
                level: 4,
                tier: "입문",
                tierColor: "bg-green-500/20 text-green-400 border-green-500/40",
                difficulty: "입문 ★",
                image: "/labs/images/lv04-flowers.jpg",

            {
                level: 5,
                tier: "입문",
                tierColor: "bg-green-500/20 text-green-400 border-green-500/40",
                difficulty: "입문 ★",
                image: "/labs/images/lv05-coffee.jpg",
                targetPrompt: "하얀 커피잔에 갈색 라떼가 담겨있고 나무 테이블 위에 놓여있다.",
                scoringGuide: "핵심 대상: 커피/라떼를 언급했는지. 색상·수량: 하얀 잔, 갈색 커피를 표현했는지. 위치·배경: 나무 테이블 위를 언급했는지. 세부 묘사: 라떼아트, 잔의 형태 등 추가 표현.",

            },

            // ===== 초급 (6~10): 사물 + 간단한 환경/상황 ★★ =====
            {
                level: 6,
                tier: "초급",
                tierColor: "bg-blue-500/20 text-blue-400 border-blue-500/40",
                difficulty: "초급 ★★",
                image: "/labs/images/lv06-bicycle.jpg",
                targetPrompt: "빨간 자전거 한 대가 벽돌 벽 앞에 세워져 있다.",

                hint: "탈것이 보이네요! 무슨 색인지, 뒤에 무엇이 있는지, 어떤 상태인지 묘사해보세요."
            },
            {
                level: 7,
                tier: "초급",
                tierColor: "bg-blue-500/20 text-blue-400 border-blue-500/40",
                difficulty: "초급 ★★",

        function initGame() {
            // 저장된 진행 상태 복원
            const saved = localStorage.getItem('promptChallenge_level');
            if (saved !== null) {
                const idx = parseInt(saved, 10);
                if (idx >= 0 && idx < levels.length) currentLevelIndex = idx;
            }
            setupTabEvents();
            setupGridLayout();
            renderLevel();
            setupEventListeners();
        }

        function setupGridLayout() {
            if (window.innerWidth >= 768) {
                elMainGrid.style.gridTemplateColumns = '1fr 1fr';
                document.querySelectorAll('.tab-content').forEach(el => {
                    el.classList.add('active');
                    el.style.display = 'flex';
                });
            }
        }

        function setupTabEvents() {
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const target = btn.dataset.tab;
                    document.getElementById('panel-image').style.display = target === 'image' ? 'flex' : 'none';
                    document.getElementById('panel-write').style.display = target === 'write' ? 'flex' : 'none';
                });
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth >= 768) {
                    elMainGrid.style.gridTemplateColumns = '1fr 1fr';
                    document.getElementById('panel-image').style.display = 'flex';
                    document.getElementById('panel-write').style.display = 'flex';
                } else {
                    elMainGrid.style.gridTemplateColumns = '1fr';
                    const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'image';
                    document.getElementById('panel-image').style.display = activeTab === 'image' ? 'flex' : 'none';
                    document.getElementById('panel-write').style.display = activeTab === 'write' ? 'flex' : 'none';
                }
            });
        }

        function renderLevel() {
            const levelData = levels[currentLevelIndex];
            elLevelDisplay.textContent = `LEVEL ${levelData.level}`;
            elTargetImage.src = levelData.image;
            elDifficultyBadge.textContent = levelData.difficulty;
            elMascotHint.innerHTML = levelData.hint;
            elPromptInput.value = '';
            elCharCount.textContent = '0';
            failCount = 0;
            lastPrompt = '';
            elPrevPromptArea.classList.add('hidden');
            elAnswerReveal.classList.add('hidden');
            elBtnShowAnswer.classList.add('hidden');

            // 티어 뱃지
            elTierBadge.className = `tier-label ${levelData.tierColor} border`;
            elTierBadge.textContent = levelData.tier;

            // 프로그레스 바
            const pct = ((currentLevelIndex + 1) / levels.length) * 100;
            elProgressFill.style.width = pct + '%';
            elProgressText.textContent = `${currentLevelIndex + 1}/${levels.length}`;

            // 진행 상태 저장
            localStorage.setItem('promptChallenge_level', currentLevelIndex);
        }

        function setupEventListeners() {
            elPromptInput.addEventListener('input', (e) => {
                const length = e.target.value.length;
                elCharCount.textContent = length;
                if (length > 300) {
                    e.target.value = e.target.value.substring(0, 300);
                    elCharCount.textContent = 300;
                }
            });
            elSubmitBtn.addEventListener('click', handleSubmit);
            elBtnCustomHint.addEventListener('click', handleCustomHint);
            elBtnEnhance.addEventListener('click', handleEnhancePrompt);
            elBtnShowAnswer.addEventListener('click', showAnswer);
            elShowAnswerModalBtn.addEventListener('click', () => {
                closeModal();
                showAnswer();
            });
        }

        function showAnswer() {
            const targetPrompt = levels[currentLevelIndex].targetPrompt;
            elAnswerText.textContent = targetPrompt;
            elAnswerReveal.classList.remove('hidden');
            if (window.innerWidth < 768) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-tab="image"]').classList.add('active');
                document.getElementById('panel-image').style.display = 'flex';
                document.getElementById('panel-write').style.display = 'none';
            }
        }

        async function handleSubmit() {
            const userInput = elPromptInput.value.trim();
            if (!userInput) { alertCustom("프롬프트를 입력해주세요!"); return; }
            if (userInput.length < 5) { alertCustom("조금 더 적어볼까요? (최소 5자 이상)"); return; }

            const originalBtnHtml = elSubmitBtn.innerHTML;
            elSubmitBtn.innerHTML = '<span class="loader"></span> AI가 채점 중...';
            elSubmitBtn.disabled = true;
            elSubmitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const result = await evaluatePromptWithGemini(userInput, levels[currentLevelIndex]);
                lastPrompt = userInput;
                showResultModal(result.score, result.feedback, result.rubric);
            } catch (error) {
                console.error("평가 오류:", error);
                alertCustom("AI 채점 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
            } finally {
                elSubmitBtn.innerHTML = originalBtnHtml;
                elSubmitBtn.disabled = false;
                elSubmitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        function alertCustom(msg) {
            elFeedbackText.textContent = msg;
            elResultIcon.innerHTML = '\u26A0\uFE0F';
            elResultTitle.textContent = "알림";
            elResultTitle.className = "text-xl font-bold leading-tight text-yellow-400";
            document.getElementById('pass-label').textContent = '';
            elScoreCircle.setAttribute('stroke-dasharray', '0, 100');
            elScoreCircle.className = 'text-gray-500';
            elScoreText.textContent = "-";
            document.getElementById('rubric-section').classList.add('hidden');
            elNextActionBtn.textContent = "확인";
            elNextActionBtn.className = "w-full py-3 rounded-xl font-bold text-black bg-yellow-400 hover:bg-yellow-500";
            elNextActionBtn.onclick = closeModal;
            elShowAnswerModalBtn.classList.add('hidden');
            elModal.classList.remove('hidden');
        }

        async function handleCustomHint() {
            const userInput = elPromptInput.value.trim();
            const levelData = levels[currentLevelIndex];
            const originalText = elBtnCustomHint.innerHTML;
            elBtnCustomHint.innerHTML = '<span class="loader" style="width:14px;height:14px;border-width:2px;"></span>';
            elBtnCustomHint.disabled = true;
            try {
                const systemPrompt = `당신은 'AI놀자'의 친절한 마스코트 힌트 요정입니다. 사용자가 작성중인 프롬프트와 정답(목표) 프롬프트를 비교해서, 사용자가 놓치고 있는 핵심 요소(색상, 수량, 위치, 배경, 사물 등)에 대한 '간접적인' 힌트를 주세요. 절대 정답 단어를 직접 말하지 말고, 질문형이나 비유를 통해 생각하게 만드세요. 한국어로 친절하고 발랄하게 1~2문장으로 답해주세요.`;
                const userQuery = `정답 프롬프트: "${levelData.targetPrompt}"\n채점 포인트: ${levelData.scoringGuide}\n현재 사용자 입력: "${userInput || '(아직 입력 안함)'}"`;
                const responseText = await callGeminiTextAPI(systemPrompt, userQuery);
                typeText(elMascotHint, responseText);
            } catch (error) {
                elMascotHint.textContent = "앗, 힌트를 가져오는데 문제가 생겼어요. 다시 시도해볼래요?";
            } finally {
                elBtnCustomHint.innerHTML = originalText;
                elBtnCustomHint.disabled = false;
            }
        }

        async function handleEnhancePrompt() {
            const userInput = elPromptInput.value.trim();
            if (!userInput) { alertCustom("마법을 부리려면 기준이 될 단어나 문장을 조금이라도 적어주세요!"); return; }
            const originalText = elBtnEnhance.innerHTML;
            elBtnEnhance.innerHTML = '<span class="loader" style="width:14px;height:14px;border-width:2px;border-left-color:#ff00ff;"></span>';
            elBtnEnhance.disabled = true;
            try {
                const systemPrompt = `당신은 AI 이미지 프롬프트 전문가입니다. 사용자가 작성한 간단한 문장을 바탕으로, 더 구체적이고 명확한 프롬프트로 확장해주세요. 색상, 수량, 위치, 재질, 빛의 방향 등을 추가하세요. 반드시 한국어로 자연스럽게 작성하고, 부가 설명이나 따옴표 없이 오직 확장된 프롬프트 결과물 텍스트만 출력하세요. (최대 250자)`;
                const userQuery = `사용자 입력: "${userInput}"`;
                const responseText = await callGeminiTextAPI(systemPrompt, userQuery);
                elPromptInput.value = responseText.replace(/"/g, '').trim().substring(0, 300);
                elCharCount.textContent = elPromptInput.value.length;
                typeText(elMascotHint, "\uD83D\uDCAB 프롬프트 마법사가 문장을 더 구체적으로 만들어줬어요! 어떤 점이 달라졌는지 확인해볼까요?");
            } catch (error) {
                alertCustom("마법 주문이 꼬였어요. 잠시 후 다시 시도해주세요!");
            } finally {
                elBtnEnhance.innerHTML = originalText;
                elBtnEnhance.disabled = false;
            }
        }

        async function callGeminiTextAPI(systemPrompt, userQuery) {
            const response = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ systemPrompt, userQuery, jsonMode: false })
            });
            if (!response.ok) throw new Error(`API error: ${response.status}`);
            const data = await response.json();
            return data.result;
        }

        function typeText(element, text) {
            element.innerHTML = '';
            let i = 0;
            const interval = setInterval(() => {
                element.innerHTML += text.charAt(i);
                i++;
                if (i > text.length - 1) clearInterval(interval);
            }, 25);
        }

        async function evaluatePromptWithGemini(userPrompt, levelData) {
            const systemPrompt = `당신은 'AI놀자' 브랜드의 친절하고 전문적인 AI 프롬프트 평가 디렉터입니다.
사용자가 제공된 이미지를 얼마나 잘 묘사하는 프롬프트를 작성했는지 평가해야 합니다.
목표 프롬프트(정답의 기준)와 사용자의 프롬프트를 비교하여 아래 4개 카테고리로 나누어 채점하세요.

## 채점 카테고리 (각 0~25점, 합계 100점)
1. **핵심 대상 (subject)**: 이미지의 주요 사물/인물을 정확히 언급했는가?
2. **색상·수량 (color_quantity)**: 색깔, 개수, 크기 등 구체적인 속성을 표현했는가?
3. **위치·배경 (location)**: 사물이 어디에 있는지, 배경/환경을 설명했는가?
4. **세부 묘사 (detail)**: 상태, 동작, 분위기, 질감 등 추가적인 디테일이 있는가?

## 이 레벨의 채점 가이드
${levelData.scoringGuide}

## 중요 규칙
- 사용자가 핵심 단어를 정확히 쓰지 않아도, 의미가 통하면 점수를 줄 것 (예: "나무 탁자" = "나무 식탁")
- 입문 레벨(1~5)에서는 세부 묘사 카테고리를 관대하게 채점할 것
- 고급 레벨(16~20)에서는 분위기/감성 표현까지 요구할 것

반드시 아래 JSON 스키마를 따르는 JSON 객체 하나만 반환하세요. 다른 텍스트는 절대 포함하지 마세요.
{
  "score": 총점(정수, 0~100),
  "rubric": {
    "subject": 핵심 대상 점수(0~25),
    "color_quantity": 색상·수량 점수(0~25),
    "location": 위치·배경 점수(0~25),
    "detail": 세부 묘사 점수(0~25)
  },
  "feedback": "잘한 점과 아쉬운 점을 구체적으로 짚어주는 친절한 한국어 피드백 2~3문장. 어떤 단어/요소를 추가하면 점수가 오를지 힌트 포함."
}`;
            const userQuery = `목표 프롬프트: "${levelData.targetPrompt}"\n사용자 프롬프트: "${userPrompt}"`;
            const response = await fetch('/api/gemini', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ systemPrompt, userQuery, jsonMode: true })
            });
            if (!response.ok) throw new Error(`API error: ${response.status}`);
            const data = await response.json();
            return JSON.parse(data.result);
        }

        function renderRubric(rubric) {
            const section = document.getElementById('rubric-section');
            section.classList.remove('hidden');
            const barsEl = document.getElementById('rubric-bars');
            barsEl.innerHTML = '';

            const categories = [
                { key: 'subject',        label: '핵심 대상',   icon: 'fa-bullseye',   color: 'bg-cyan-400' },
                { key: 'color_quantity',  label: '색상·수량',   icon: 'fa-palette',    color: 'bg-blue-400' },
                { key: 'location',        label: '위치·배경',   icon: 'fa-location-dot', color: 'bg-purple-400' },
                { key: 'detail',          label: '세부 묘사',   icon: 'fa-feather',    color: 'bg-pink-400' },
            ];

            categories.forEach(cat => {
                const score = rubric?.[cat.key] ?? 0;
                const pct = (score / 25) * 100;
                const row = document.createElement('div');
                row.innerHTML = `
                    <div class="flex items-center gap-2 mb-1">
                        <i class="fa-solid ${cat.icon} text-xs w-3 text-gray-500"></i>
                        <span class="text-xs text-gray-300 w-20 shrink-0">${cat.label}</span>
                        <div class="flex-1 h-2 bg-gray-800 rounded-full overflow-hidden">
                            <div class="rubric-bar-fill ${cat.color}" data-pct="${pct}"></div>
                        </div>
                        <span class="text-xs font-bold w-10 text-right ${score >= 20 ? 'text-green-400' : score >= 12 ? 'text-yellow-400' : 'text-red-400'}">${score}/25</span>
                    </div>`;
                barsEl.appendChild(row);
            });

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    document.querySelectorAll('.rubric-bar-fill').forEach(bar => {
                        bar.style.width = bar.dataset.pct + '%';
                    });
                });
            });
        }

        function showResultModal(score, feedback, rubric) {
            elModal.classList.remove('hidden');
            const isPass = score >= passScore;

            let currentScore = 0;
            const scoreInterval = setInterval(() => {
                if (currentScore >= score) {
                    clearInterval(scoreInterval);
                    elScoreText.textContent = score;
                    elScoreCircle.setAttribute('stroke-dasharray', `${score}, 100`);
                } else {
                    currentScore += Math.ceil((score - currentScore) / 5) || 1;
                    elScoreText.textContent = currentScore;
                    elScoreCircle.setAttribute('stroke-dasharray', `${currentScore}, 100`);
                }
            }, 30);

            renderRubric(rubric);
            elFeedbackText.textContent = feedback;
            document.getElementById('pass-label').textContent = `합격 기준: ${passScore}점`;

            if (isPass) {
                elResultIcon.innerHTML = '\uD83C\uDF89';
                elResultTitle.textContent = "SUCCESS!";
                elResultTitle.className = "text-xl font-bold leading-tight text-green-400";
                elScoreCircle.className = "text-green-400";
                elModalBgGlow.className = "absolute inset-0 opacity-20 pointer-events-none bg-green-500";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#00ffff', '#ff00ff', '#00ff00'] });

                elShowAnswerModalBtn.classList.remove('hidden');
                elShowAnswerModalBtn.classList.add('flex');

                if (currentLevelIndex < levels.length - 1) {
                    elNextActionBtn.textContent = `다음 레벨 도전! (Level ${currentLevelIndex + 2})`;
                    elNextActionBtn.className = "w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-green-500 to-emerald-600 shadow-[0_0_15px_rgba(16,185,129,0.5)]";
                    elNextActionBtn.onclick = () => { currentLevelIndex++; closeModal(); renderLevel(); };
                } else {
                    elNextActionBtn.textContent = "\uD83C\uDFC6 프롬프트 마스터 달성! 처음부터 다시하기";
                    elNextActionBtn.className = "w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-cyan-500 to-blue-600";
                    elNextActionBtn.onclick = () => { currentLevelIndex = 0; closeModal(); renderLevel(); confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } }); };
                }
            } else {
                failCount++;
                elResultIcon.innerHTML = '\uD83E\uDD14';
                elResultTitle.textContent = "조금 더 다듬어봐요!";
                elResultTitle.className = "text-xl font-bold leading-tight text-orange-400";
                elScoreCircle.className = "text-orange-400";
                elModalBgGlow.className = "absolute inset-0 opacity-10 pointer-events-none bg-orange-500";

                elNextActionBtn.textContent = "피드백 반영해서 다시 시도";
                elNextActionBtn.className = "w-full py-3 rounded-xl font-bold text-white bg-gray-700 hover:bg-gray-600 border border-gray-600";
                elNextActionBtn.onclick = () => {
                    if (lastPrompt) {
                        elPrevPromptText.textContent = lastPrompt;
                        elPrevPromptArea.classList.remove('hidden');
                    }
                    closeModal();
                    if (window.innerWidth < 768) {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        document.querySelector('[data-tab="write"]').classList.add('active');
                        document.getElementById('panel-image').style.display = 'none';
                        document.getElementById('panel-write').style.display = 'flex';
                    }
                };

                if (failCount >= 2) {
                    elShowAnswerModalBtn.classList.remove('hidden');
                    elShowAnswerModalBtn.classList.add('flex');
                    elBtnShowAnswer.classList.remove('hidden');
                } else {
                    elShowAnswerModalBtn.classList.add('hidden');
                    elBtnShowAnswer.classList.add('hidden');
                }
            }
        }

        function closeModal() {
            elModal.classList.add('hidden');
            elScoreCircle.setAttribute('stroke-dasharray', '0, 100');
            elScoreText.textContent = "0";
        }

        initGame();
    </script>
</body>
</html>
