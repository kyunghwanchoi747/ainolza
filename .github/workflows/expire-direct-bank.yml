name: Expire Direct-Bank Orders

# 무통장 입금 마감(24h) 지난 pending 주문을 자동으로 cancelled 처리.
# 매시간 정각 실행.

on:
  schedule:
    - cron: '0 * * * *' # every hour at minute 0
  workflow_dispatch:

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - name: Hit expire endpoint
        run: |
          curl -sf -X POST "https://ainolza.kr/api/cron/expire-direct-bank?key=${CRON_KEY}" || true
        env:
          CRON_KEY: ${{ secrets.CRON_KEY }}
