name: Deploy to Cloudflare

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Remove SQLite packages (not needed for D1 production)
        run: rm -rf node_modules/@payloadcms/db-sqlite node_modules/@libsql

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build
        env:
          NODE_OPTIONS: "--no-deprecation --max-old-space-size=8000"
          BUILD_PHASE: "true"

      - name: Prepare Pages deploy
        run: cp .open-next/worker.js .open-next/assets/_worker.js

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next/assets --project-name ainolza --branch master
