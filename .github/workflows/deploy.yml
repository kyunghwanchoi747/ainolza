name: Deploy to Cloudflare

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Payload migrations on D1 (production)
        run: npx cross-env NODE_ENV=production PAYLOAD_SECRET=ignore payload migrate
        env:
          PAYLOAD_SECRET: ignore

      - name: Seed classroom sessions (idempotent)
        run: npx cross-env NODE_ENV=production PAYLOAD_CLI=1 PAYLOAD_SECRET=ignore tsx scripts/seed-classroom-sessions.ts
        env:
          PAYLOAD_SECRET: ignore

      - name: Remove SQLite packages (not needed for D1 production)
        run: rm -rf node_modules/@payloadcms/db-sqlite node_modules/@libsql

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build
        env:
          NODE_OPTIONS: "--no-deprecation --max-old-space-size=8000"
          BUILD_PHASE: "true"
          NEXT_PUBLIC_PORTONE_STORE_ID: store-32c055e8-eaea-4e2a-bf26-cfdc4e73d548
          NEXT_PUBLIC_PORTONE_CHANNEL_KEY: channel-key-8f029d2e-1279-4aa7-b25e-6e518c72d083

      - name: Deploy to Cloudflare
        run: npx wrangler deploy --config wrangler.jsonc
